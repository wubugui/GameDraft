# 事件类型全集。模拟器每周按 pick_weight × 节奏系数 × 周期系数 加权抽样 3～6 条（默认），
# 仅将入选类型交给 Director；不会每周触发全部类型。
#
# dramatic_brief / effect_brief：只描述「这一类事件在叙事上承担什么功能、可能牵动哪些轴」，
# 不写具体场面、对白、器物与地点情节；具体内容由 Director 根据 run 内世界种子与意图推演。
# 兼容旧字段：若仅有 narrative_template / consequences_template，加载器会映射到上述两项。
#
# 字段说明：
#   pick_weight: 相对入选权重
#   period_every_n_weeks / period_phase / period_weight_mult: 周期加码
#   cooldown_weeks: 同类型最小间隔周数
#   conditions: 如 "week >= 2"
#
# run.json 可选: "event_pick": { "min": 3, "max": 7 }

event_types:
  - id: river_dispute
    category: 江湖
    tier: minor
    conditions: "week >= 1"
    pick_weight: 1.05
    cooldown_weeks: 2
    supernatural_prob: 0.05
    dramatic_brief: "群体在生计资源或势力边界上的公开摊牌与对峙。"
    effect_brief: "关系张力、结盟或结仇、后续报复风险。"
    actor_slots:
      - role: 挑头
        tier_min: B
        tier_max: S
      - role: 围观
        tier_min: B
        tier_max: B

