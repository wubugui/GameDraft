id: flow_dock_water_monkey
compositionId: dock_water_monkey_ring_flow
label: 码头水鬼 / 水猴子到铁环流程
graphLabel: 小孩滚铁环
description: 码头看板、水边触发、捞箱、滚铁环小孩与归还铁环任务的叙事编排画布。
owner:
  type: flow
  id: 码头水鬼
initialState: initial
states:
  initial:
    label: 未开始
    broadcastOnEnter: false
  board_read:
    label: 看板初读
  waterside_available:
    label: 水边可触发
  crate_minigame_done:
    label: 箱子捞起
    broadcastOnEnter: true
transitions:
  - id: t_board_read
    from: initial
    to: board_read
    signal: board_read_done
  - id: t_waterside_available
    from: board_read
    to: waterside_available
    signal: entered
  - id: t_crate_done
    from: waterside_available
    to: crate_minigame_done
    signal: pull_success
layout:
  initial:
    x: 24
    y: 24
  board_read:
    x: 374
    y: 24
  waterside_available:
    x: 724
    y: 24
  crate_minigame_done:
    x: 1074
    y: 24
elements:
  - id: dialogue_dock_board
    kind: dialogueBlackbox
    label: 码头看板
    refId: 码头看板
    x: 24
    y: -96
    meta:
      emits:
        - board_read_done
      reads: []
      commands: []
  - id: zone_waterside
    kind: zoneBlackbox
    label: 水边触发区
    refId: 码头白天:new_zone_2
    x: 374
    y: -96
    meta:
      emits:
        - entered
      reads: []
      commands: []
  - id: minigame_crate
    kind: minigameBlackbox
    label: 捞箱小游戏
    refId: dock_crate_tutorial
    x: 724
    y: -96
    meta:
      emits:
        - pull_success
      reads: []
      commands: []
  - id: wrapper_npc_ringboy
    kind: wrapperGraph
    label: 滚铁环小孩 Wrapper
    ownerType: npc
    ownerId: npc_ringboy
    x: 1524
    y: 60
    graph:
      id: npc_ringboy
      ownerType: npc
      ownerId: npc_ringboy
      category: 水猴子事件状态
      initialState: before_event
      states:
        before_event:
          id: before_event
          label: 事件前
          meta:
            editor:
              x: 0
              y: 0
        after_event:
          id: after_event
          label: 水猴子事件后
          meta:
            editor:
              x: 220
              y: 0
          onEnterActions:
            - id: set_ringboy_stand_after_event
              type: persistNpcAnimState
              params:
                target: npc_ringboy
                state: boy_stand_ring
            - id: disable_ringboy_patrol_after_event
              type: persistNpcDisablePatrol
              params:
                npcId: npc_ringboy
        ring_taken:
          id: ring_taken
          label: 玩家已拿到铁环
          broadcastOnEnter: true
          meta:
            editor:
              x: 470
              y: 0
        ring_returned:
          id: ring_returned
          label: 铁环已归还
          meta:
            editor:
              x: 720
              y: 0
      transitions:
        - id: t_ringboy_after_event
          from: before_event
          to: after_event
          signal: state:flow_dock_water_monkey:crate_minigame_done
        - id: t_ring_taken
          from: after_event
          to: ring_taken
          signal: ring_taken
        - id: t_ring_returned
          from: ring_taken
          to: ring_returned
          signal: ring_returned
    meta:
      emits: []
      reads: []
      commands: []
  - id: dialogue_ringboy
    kind: dialogueBlackbox
    label: 滚铁环小孩对话
    refId: 滚铁环小孩
    x: 24
    y: -186
    meta:
      reads:
        - npc_ringboy
      emits:
        - ring_taken
        - ring_returned
      commands: []
  - id: wrapper_quest_return_ring
    kind: wrapperGraph
    label: 归还铁环 Quest Wrapper
    ownerType: quest
    ownerId: 支线-归还小孩铁环-归还铁环
    x: 1524
    y: 150
    graph:
      id: quest_return_ring
      ownerType: quest
      ownerId: 支线-归还小孩铁环-归还铁环
      category: 归还铁环任务
      initialState: inactive
      states:
        inactive:
          id: inactive
          label: 未激活
          meta:
            editor:
              x: 0
              y: 0
        active:
          id: active
          label: 已激活
          meta:
            editor:
              x: 230
              y: 0
          onEnterActions:
            - id: activate_return_ring_quest
              type: updateQuest
              params:
                id: 支线-归还小孩铁环-归还铁环
        completed:
          id: completed
          label: 已完成
          meta:
            editor:
              x: 470
              y: 0
      transitions:
        - id: t_activate_return_ring
          from: inactive
          to: active
          signal: state:npc_ringboy:ring_taken
    meta:
      emits: []
      reads: []
      commands: []
